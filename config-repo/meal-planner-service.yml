# Configuration specific to meal-planner-service
server:
  port: 8086

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:cookmate}
    username: ${DB_USER:cookmate}
    password: ${DB_PASS:cookmate}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: meal_planner
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

meal-planner-service:
  main-service-url: http://main-service:8081

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
