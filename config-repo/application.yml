# Global configuration shared by all services
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.cookmate: DEBUG
    org.springframework.cloud: INFO

# Centralized OAuth2 Resource Server configuration for all business microservices
# Each service validates JWT tokens issued by Keycloak
spring:
  datasource:
    hikari:
      maximum-pool-size: 30       # 3 services × 30 = 90 + keycloak/sonar ~40 = 130 << max_connections=500
      minimum-idle: 5
      connection-timeout: 30000   # 30s before throwing exception (prevent thread starvation)
      idle-timeout: 600000        # 10 min idle before releasing connection
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_PUBLIC_URL:http://localhost:8080}/realms/cookmate
          jwk-set-uri: ${KEYCLOAK_INTERNAL_URL:http://keycloak:8080}/realms/cookmate/protocol/openid-connect/certs
