networks:
  cookmate-net:
    driver: bridge

volumes:
  postgres-data:
  keycloak-data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

services:

  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: cookmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cookmate
      POSTGRES_USER: cookmate
      POSTGRES_PASSWORD: cookmate
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - cookmate-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookmate -d cookmate && pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s

  # ─────────────────────────────────────────────
  # Config Service (port 8888)
  # Startup order: 1st
  # ─────────────────────────────────────────────
  config-service:
    build:
      context: ./config-service
      dockerfile: Dockerfile
    container_name: cookmate-config
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      CONFIG_REPO_PATH: /config-repo
    volumes:
      - ./config-repo:/config-repo:ro
    networks:
      - cookmate-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ─────────────────────────────────────────────
  # Discovery Service / Eureka (port 8761)
  # Startup order: 2nd (after config-service)
  # ─────────────────────────────────────────────
  discovery-service:
    build:
      context: ./discovery-service
      dockerfile: Dockerfile
    container_name: cookmate-discovery
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      HOSTNAME: discovery-service
    depends_on:
      config-service:
        condition: service_healthy
    networks:
      - cookmate-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  # ─────────────────────────────────────────────
  # Main Service (port 8081)
  # Startup order: 3rd (after discovery + postgres)
  # ─────────────────────────────────────────────
  main-service:
    build:
      context: ./main-service
      dockerfile: Dockerfile
    container_name: cookmate-main
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka/
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - cookmate-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  # ─────────────────────────────────────────────
  # Simulator Service (port 8082)
  # Startup order: 3rd (after discovery + postgres)
  # ─────────────────────────────────────────────
  simulator-service:
    build:
      context: ./simulator-service
      dockerfile: Dockerfile
    container_name: cookmate-simulator
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      CONFIG_SERVER_URL: http://config-service:8888
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka/
      DB_HOST: postgres
      DB_NAME: cookmate
      DB_USER: cookmate
      DB_PASS: cookmate
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - cookmate-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  # ─────────────────────────────────────────────
  # Keycloak Identity & Access Management (port 8080)
  # Startup order: after postgres is healthy
  # ─────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: cookmate-keycloak
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: "${KEYCLOAK_DB_USER:-keycloak}"
      KC_DB_PASSWORD: "${KEYCLOAK_DB_PASSWORD:-keycloak}"
      KC_DB_URL_PROPERTIES: "?sslmode=disable"
      KC_HOSTNAME_URL: http://localhost:8080
      KC_HOSTNAME_ADMIN_URL: http://localhost:8080
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
      KC_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cookmate-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    command: ["start-dev", "--import-realm"]

  # ─────────────────────────────────────────────
  # Frontend Service (port 5173)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cookmate-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      API_URL: http://main-service:8081
      SIMULATOR_URL: http://simulator-service:8082
    depends_on:
      main-service:
        condition: service_healthy
      simulator-service:
        condition: service_healthy
    networks:
      - cookmate-net

  # ─────────────────────────────────────────────
  # SonarQube Code Quality Platform (port 9000)
  # ─────────────────────────────────────────────
  sonarqube:
    image: sonarqube:10.7-community
    container_name: cookmate-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
      - SONAR_JDBC_URL=jdbc:postgresql://postgres:5432/sonar
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cookmate-net
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
