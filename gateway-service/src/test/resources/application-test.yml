spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  security:
    oauth2:
      client:
        registration:
          test:
            client-id: test-client
            client-secret: test-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile
            provider: test
        provider:
          test:
            authorization-uri: http://localhost:9999/oauth2/authorize
            token-uri: http://localhost:9999/oauth2/token
            user-info-uri: http://localhost:9999/userinfo
            jwk-set-uri: http://localhost:9999/jwks
            user-name-attribute: sub
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/realms/test
          jwk-set-uri: http://localhost:9999/jwks


server:
  port: 0

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
